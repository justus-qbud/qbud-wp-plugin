name: Build and Deploy Plugin to CDN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify versions are in sync
        run: |
          header=$(grep -oiP '^\s*\*\s*Version:\s*\K[0-9.]+' qbud.php | head -n1)
          const=$(grep -oP "define\(\s*'QBUD_VERSION'\s*,\s*'\K[0-9.]+" qbud.php | head -n1)
          manifest=$(jq -r '.version' qbud.json)
          echo "Plugin header:   $header"
          echo "QBUD_VERSION:    $const"
          echo "qbud.json:       $manifest"
          if [ -z "$header" ] || [ -z "$const" ] || [ -z "$manifest" ]; then
            echo "Could not read one of the versions."
            exit 1
          fi
          if [ "$header" != "$const" ] || [ "$header" != "$manifest" ]; then
            echo "Version mismatch: header=$header QBUD_VERSION=$const qbud.json=$manifest"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          mkdir -p dist build/qbud
          # Copy plugin files into a folder named after the install slug
          # so the zip extracts to wp-content/plugins/qbud/.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='assets' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='qbud.json' \
            ./ build/qbud/
          (cd build && zip -r ../dist/qbud-wp.zip qbud)
          ls -la dist/

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Copy zip and manifest to server
        run: |
          scp ./dist/qbud-wp.zip ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}/qbud-wp.zip
          scp ./qbud.json ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}/qbud.json

      - name: Purge Cloudflare cache for plugin zip and manifest
        run: |
          payload=$(jq -nc '{files: ["https://app.qbud.ai/cdn/qbud-wp.zip", "https://app.qbud.ai/cdn/qbud.json"]}')
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$payload")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "Cloudflare purge failed with HTTP $status"
            exit 1
          fi
